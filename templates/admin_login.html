<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Admin Login | KingSTrips</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Outfit',sans-serif;
      overflow:hidden;
      background:#0f172a;
    }

    /* ─────────────────────────
       BACKGROUND
    ───────────────────────── */
    .login-wrapper{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at top left,#2563eb 0%,transparent 35%),
        radial-gradient(circle at bottom right,#0ea5e9 0%,transparent 30%),
        linear-gradient(135deg,#020617,#0f172a,#111827);
      padding:2rem;
    }

    .bg-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(10px);
      opacity:.18;
      animation:float 8s ease-in-out infinite;
    }

    .circle-1{
      width:300px;
      height:300px;
      background:#3b82f6;
      top:-80px;
      left:-80px;
    }

    .circle-2{
      width:240px;
      height:240px;
      background:#0ea5e9;
      bottom:-60px;
      right:-60px;
      animation-delay:2s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
    }

    /* ─────────────────────────
       LOGIN CARD
    ───────────────────────── */
    .login-card{
      width:100%;
      max-width:460px;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(18px);
      border-radius:30px;
      padding:2.8rem;
      position:relative;
      z-index:2;
      box-shadow:
        0 30px 80px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.7);
      animation:fadeUp .5s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(18px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* ─────────────────────────
       LOGO
    ───────────────────────── */
    .login-logo{
      text-align:center;
      margin-bottom:2rem;
    }

    .logo-icon{
      width:78px;
      height:78px;
      margin:0 auto 1rem;
      border-radius:24px;
      background:linear-gradient(135deg,#0d6efd,#2563eb);
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:2rem;
      box-shadow:0 15px 35px rgba(37,99,235,.35);
    }

    .login-logo h1{
      font-size:1.8rem;
      font-weight:800;
      color:#0f172a;
      margin-bottom:.35rem;
    }

    .login-logo p{
      color:#64748b;
      font-size:.95rem;
      margin:0;
    }

    /* ─────────────────────────
       FORM
    ───────────────────────── */
    .form-group{
      margin-bottom:1.1rem;
    }

    .form-group label{
      display:block;
      margin-bottom:.45rem;
      font-size:.88rem;
      font-weight:700;
      color:#334155;
    }

    .input-wrapper{
      position:relative;
    }

    .input-wrapper i{
      position:absolute;
      top:50%;
      left:16px;
      transform:translateY(-50%);
      color:#94a3b8;
      font-size:1rem;
    }

    .form-control{
      width:100%;
      border-radius:16px;
      border:1px solid #e2e8f0;
      padding:14px 16px 14px 46px;
      font-size:1rem;
      background:#f8fafc;
      transition:.25s ease;
      font-family:'Outfit',sans-serif;
    }

    .form-control:focus{
      outline:none;
      border-color:#0d6efd;
      background:white;
      box-shadow:0 0 0 4px rgba(13,110,253,.12);
    }

    /* ─────────────────────────
       BUTTON
    ───────────────────────── */
    .btn-login{
      width:100%;
      border:none;
      border-radius:100px;
      padding:15px;
      margin-top:.8rem;
      background:linear-gradient(135deg,#0d6efd,#004fc7);
      color:white;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:.3s ease;
      box-shadow:0 12px 30px rgba(13,110,253,.25);
    }

    .btn-login:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 40px rgba(13,110,253,.35);
    }

    .btn-login:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    /* ─────────────────────────
       ALERT
    ───────────────────────── */
    .alert-danger{
      background:#fee2e2;
      border:1px solid #fecaca;
      color:#991b1b;
      padding:14px 16px;
      border-radius:16px;
      margin-bottom:1rem;
      font-size:.9rem;
      font-weight:600;
    }

    /* ─────────────────────────
       FOOTER LINK
    ───────────────────────── */
    .back-link{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:1.5rem;
      text-decoration:none;
      color:#64748b;
      font-size:.92rem;
      font-weight:600;
      transition:.25s ease;
    }

    .back-link:hover{
      color:#0d6efd;
    }

    /* ─────────────────────────
       MOBILE
    ───────────────────────── */
    @media(max-width:576px){

      body{
        overflow:auto;
      }

      .login-wrapper{
        padding:1rem;
      }

      .login-card{
        padding:2rem 1.5rem;
        border-radius:24px;
      }

      .login-logo h1{
        font-size:1.5rem;
      }

    }

  </style>
</head>
<body>

<div class="login-wrapper">

  <!-- Background Shapes -->
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <!-- LOGIN CARD -->
  <div class="login-card">

    <!-- LOGO -->
    <div class="login-logo">

      <div class="logo-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>

      <h1>KingSTrips Admin</h1>
      <p>Sign in to manage enquiries</p>

    </div>

    <!-- ERROR -->
    {% if error %}
    <div class="alert-danger">
      {{ error }}
    </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST" id="login-form">

      <!-- USERNAME -->
      <div class="form-group">

        <label for="username">Username</label>

        <div class="input-wrapper">

          <i class="bi bi-person-fill"></i>

          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="Enter your username"
            autocomplete="username"
            autofocus
            required
          >

        </div>

      </div>

      <!-- PASSWORD -->
      <div class="form-group">

        <label for="password">Password</label>

        <div class="input-wrapper">

          <i class="bi bi-lock-fill"></i>

          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >

        </div>

      </div>

      <!-- BUTTON -->
      <button type="submit" class="btn-login" id="loginBtn">
        Continue
      </button>

    </form>

    <!-- BACK -->
    <a href="{{ url_for('index') }}" class="back-link">
      <i class="bi bi-arrow-left"></i>
      Back to website
    </a>

  </div>

</div>

<!-- LOGIN SCRIPT -->
<script>

  const form = document.getElementById('login-form');
  const btn  = document.getElementById('loginBtn');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    doLogin();
  });

  function doLogin(){

    let errEl = document.getElementById('login-error');

    if(!errEl){
      errEl = document.createElement('div');
      errEl.id = 'login-error';
      errEl.className = 'alert-danger';
      errEl.style.display = 'none';
      form.insertBefore(errEl, form.firstChild);
    }

    const payload = {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    };

    if(!payload.username || !payload.password){
      return;
    }

    btn.disabled = true;
    btn.innerHTML = `
      <span class="spinner-border spinner-border-sm me-2"></span>
      Signing in...
    `;

    fetch('{{ url_for("admin_login") }}', {
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify(payload)
    })

    .then(function(r){
      return r.json().then(function(body){
        return {
          ok:r.ok,
          body:body
        };
      });
    })

    .then(function(res){

      if(res.ok){

        window.location.href =
          '{{ url_for("admin_2fa_page") }}?u=' +
          encodeURIComponent(payload.username);

        return;
      }

      btn.disabled = false;
      btn.innerHTML = 'Continue';

      errEl.textContent =
        res.body.error || 'Login failed. Try again.';

      errEl.style.display = 'block';

    })

    .catch(function(){

      btn.disabled = false;
      btn.innerHTML = 'Continue';

      errEl.textContent =
        'Network error. Try again.';

      errEl.style.display = 'block';

    });

  }

</script>

</body>
</html>
